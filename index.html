<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARULMODSS QUANTUM V8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #0d1117, #010409);
            color: #e6edf3;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .glass {
            background: rgba(25, 30, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-text {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-grad {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: 0.3s;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-3xl">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tight mb-2">
                QUANTUM<span class="neon-text">V8</span>
            </h1>
            <div class="flex justify-center gap-4 text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase">
                <span>By Arulmodss</span>
                <span class="text-blue-900">|</span>
                <span>Encrypted Neural Link</span>
            </div>
        </div>

        <div class="glass rounded-3xl p-8 mb-6">
            <div class="relative">
                <textarea id="prompt" 
                    class="w-full bg-transparent border-b border-gray-700 py-4 text-lg focus:outline-none focus:border-blue-500 transition-all resize-none h-32 custom-scrollbar"
                    placeholder="Describe your request..."></textarea>
                
                <div class="flex justify-between items-center mt-6">
                    <div class="text-xs text-gray-500 font-medium">System ready for commands_</div>
                    <button onclick="generate()" class="btn-grad text-black font-bold px-8 py-3 rounded-full text-sm">
                        GENERATE CODE
                    </button>
                </div>
            </div>
        </div>

        <div id="result-area" class="hidden transition-all duration-500">
            <div class="glass rounded-2xl overflow-hidden border border-blue-500/20">
                <div class="bg-white/5 px-6 py-3 border-b border-white/10 flex items-center justify-between">
                    <span class="text-xs font-bold text-blue-400 tracking-widest">OUTPUT TERMINAL</span>
                    <div class="flex gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                        <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                        <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                    </div>
                </div>
                <pre id="output" class="p-8 text-sm leading-relaxed text-cyan-50/90 overflow-x-auto custom-scrollbar"></pre>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const output = document.getElementById('output');
            const area = document.getElementById('result-area');
            if(!prompt) return;

            area.classList.remove('hidden');
            output.innerHTML = `<span class="animate-pulse text-blue-400">Initializing Quantum Engine...</span>`;

            try {
                const response = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                output.innerText = data.result || "Error: Database unreachable.";
            } catch (err) {
                output.innerText = "Fatal System Error: " + err;
            }
        }
    </script>
</body>
</html>
